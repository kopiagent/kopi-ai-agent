# Nous-approved MCP catalog entry.
# Presence in this directory = approval. Merged via PR review.
#
# Schema version 1.
manifest_version: 1

name: quickbooks
description: Read and manage QuickBooks Online data — customers, invoices, bills, vendors, accounts, and financial reports.
source: https://github.com/intuit/quickbooks-online-mcp-server

# Intuit's official QBO MCP server is NOT published to npm — it must be cloned
# and built. ${INSTALL_DIR} is substituted at install time with the clone path.
transport:
  type: stdio
  command: node
  args:
    - "${INSTALL_DIR}/dist/index.js"

# Clone + build. Pin the ref; bump it deliberately on updates rather than
# floating HEAD. (Replace `main` with a release tag/commit SHA once one is cut.)
install:
  type: git
  url: https://github.com/intuit/quickbooks-online-mcp-server.git
  ref: main
  bootstrap:
    - "npm install"
    - "npm run build"

# QBO uses OAuth2 auth-code. The interactive browser handshake happens ONCE,
# outside this server, to obtain a refresh token + realm id (see post_install);
# the server then refreshes tokens itself from these four values.
auth:
  type: api_key
  env:
    - name: QUICKBOOKS_CLIENT_ID
      prompt: "Intuit app Client ID (from developer.intuit.com)"
      required: true
      secret: false
    - name: QUICKBOOKS_CLIENT_SECRET
      prompt: "Intuit app Client Secret"
      required: true
      secret: true
    - name: QUICKBOOKS_REFRESH_TOKEN
      prompt: "OAuth2 refresh token (from the one-time Intuit browser authorization)"
      required: true
      secret: true
    - name: QUICKBOOKS_REALM_ID
      prompt: "QuickBooks company Realm ID"
      required: true
      secret: false
    # Read-only by default — the server exposes 144 tools including create/update/
    # delete on real accounting data. Set to 0 only if you explicitly need writes.
    - name: QUICKBOOKS_DISABLE_WRITE
      prompt: "Disable write operations? (1 = read-only, recommended; 0 = allow writes)"
      default: "1"
      required: false
      secret: false

post_install: |
  QuickBooks Online needs a ONE-TIME OAuth handshake before this server can run,
  to obtain the refresh token and realm id entered above:

    1. developer.intuit.com → create an app → copy Client ID / Secret.
    2. Run Intuit's OAuth2 flow once in a browser to authorize a company and get
       a refresh token + realm id. Sandbox accepts http://localhost:8000/callback;
       production needs a public HTTPS callback (e.g. an ngrok tunnel).
    3. Enter Client ID, Secret, refresh token, and realm id at the prompts.

  QUICKBOOKS_DISABLE_WRITE defaults to 1 (read-only). The server also honours
  QUICKBOOKS_DISABLE_UPDATE and QUICKBOOKS_DISABLE_DELETE if you want finer
  control. Leave writes disabled unless you truly need them — this touches a real
  general ledger.

  Restart your KOPI session after install so the quickbooks tools load.

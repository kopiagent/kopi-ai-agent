name: desktop release

# Build the Kopi desktop installers for macOS / Windows / Linux and attach
# them to a GitHub Release. Triggered by pushing a `desktop-v*` tag (or
# manually via workflow_dispatch, which uploads to a draft release named
# after the current package version).
#
#   scripts/bump-version.sh 1.21.0
#   git commit -am "release: v1.21.0" && git tag v1.21.0
#   git push origin main v1.21.0
#
# (`desktop-v*` tags are still accepted for backwards compatibility.)
#
# macOS signing: with no cert secrets configured, electron-builder AD-HOC
# signs the app. That matters: Apple Silicon refuses to launch unsigned
# arm64 binaries at all — a fully-unsigned download reports the misleading
# "Kopi is damaged" error. Ad-hoc signed apps launch after the user allows
# them (System Settings → Privacy & Security → Open Anyway).
# To ship double-click-clean builds, add these repo secrets and the same
# steps sign + notarize automatically (no workflow change needed):
#   CSC_LINK / CSC_KEY_PASSWORD          — Developer ID Application .p12
#   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID — notarization
# Windows is unsigned (signAndEditExecutable: false in electron-builder).

on:
  push:
    tags:
      - 'v*'
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write # create the release + upload installer assets

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS (arm64 + x64)
            dist: 'dist:mac'
            files: |
              apps/desktop/release/*.dmg
              apps/desktop/release/*-mac-*.zip
          - os: windows-latest
            label: Windows (nsis)
            dist: 'dist:win:nsis'
            files: apps/desktop/release/*.exe
          - os: ubuntu-latest
            label: Linux (AppImage + deb + rpm)
            dist: 'dist:linux'
            files: |
              apps/desktop/release/*.AppImage
              apps/desktop/release/*.deb
              apps/desktop/release/*.rpm
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      # Inject signing env ONLY when the secrets exist. An unconditional
      # `CSC_LINK: ${{ secrets.CSC_LINK }}` sets an EMPTY string when the
      # secret is missing, and electron-builder then treats "" as a
      # certificate file path and dies with "… not a file". With no CSC_*
      # env at all it falls back to ad-hoc signing (required for arm64 to
      # launch); with the secrets configured it signs + notarizes for real.
      - name: Enable Developer ID signing when secrets exist
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -n "${{ secrets.CSC_LINK }}" ]; then
            {
              echo "CSC_LINK=${{ secrets.CSC_LINK }}"
              echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}"
              echo "APPLE_ID=${{ secrets.APPLE_ID }}"
              echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
              echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
            } >> "$GITHUB_ENV"
            echo "Signing secrets found — Developer ID signing enabled."
          else
            echo "No signing secrets — electron-builder will ad-hoc sign."
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - uses: ./.github/actions/retry
        with:
          command: npm ci

      - name: Build installers
        run: npm run --workspace apps/desktop ${{ matrix.dist }}

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./apps/desktop/package.json').version")
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release and upload installers
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          DRAFT: ${{ steps.tag.outputs.draft }}
        run: |
          set -euo pipefail

          # First matrix job to arrive creates the release; the rest reuse it.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            DRAFT_FLAG=""
            [ "$DRAFT" = "true" ] && DRAFT_FLAG="--draft"
            VERSION_LABEL="${TAG#desktop-}"   # desktop-v1.2.3 -> v1.2.3
            VERSION_LABEL="${VERSION_LABEL#v}" # v1.2.3 -> 1.2.3
            gh release create "$TAG" $DRAFT_FLAG \
              --title "Kopi Desktop ${VERSION_LABEL}" \
              --notes "Kopi desktop installers for macOS, Windows and Linux. macOS builds are ad-hoc signed (not notarized yet): on first launch approve the app under System Settings → Privacy & Security → Open Anyway, or run: xattr -cr /Applications/Kopi.app" \
              || true  # lost the race to a sibling job — fine
          fi

          shopt -s nullglob
          FILES=()
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            for f in $pattern; do FILES+=("$f"); done
          done <<< "${{ matrix.files }}"

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No installer artifacts matched — build output layout changed?"
            ls -la apps/desktop/release/ || true
            exit 1
          fi

          gh release upload "$TAG" "${FILES[@]}" --clobber
          echo "Uploaded: ${FILES[*]}"
